name: Release to CurseForge

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Trim changelog to latest entry
        run: |
          awk '/^## \[[0-9]/{if(n++)exit; found=1} found' CHANGELOG.md \
            | sed 's/^### /#### /; s/^## \[/### [/' > CHANGELOG_TRIMMED.md
          mv CHANGELOG_TRIMMED.md CHANGELOG.md

      - uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: -g retail -n "{package-name} {project-version}"
